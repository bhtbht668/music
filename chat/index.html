<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>微聊完整版</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        #sidebar { width: 250px; background: #f8f9fa; border-right: 1px solid #ddd; padding: 15px; }
        #chat-area { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        #msgBox { flex: 1; border: 1px solid #ccc; overflow-y: auto; margin-bottom: 10px; padding: 10px; }
        li { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        li:hover { background: #e9ecef; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>好友列表</h3>
        <ul id="friendList"></ul>
    </div>
    <div id="chat-area">
        <h2 id="chatTitle">请选择好友</h2>
        <div id="msgBox"></div>
        <div>
            <input id="msgInput" style="width: 80%" placeholder="输入消息...">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://api.20140712.xyz";
        let myId = "001"; // 实际应用中请改为登录后的变量
        let currentFriend = "";

        // 加载列表
        async function loadChatList() {
            const res = await fetch(`${API_BASE}/api/list?userId=${myId}`);
            const data = await res.json();
            document.getElementById("friendList").innerHTML = data.friends
                .map(f => `<li onclick="selectFriend('${f.friendId}')">${f.friendId}</li>`).join('');
        }

        // 切换对象
        function selectFriend(friendId) {
            currentFriend = friendId;
            document.getElementById("chatTitle").innerText = "与 " + friendId + " 聊天中";
            document.getElementById("msgBox").innerHTML = "";
        }

        // 发送消息
        async function sendMessage() {
            const content = document.getElementById("msgInput").value;
            if (!currentFriend) return alert("请先选个好友！");
            
            await fetch(`${API_BASE}/api/send`, {
                method: 'POST',
                body: JSON.stringify({ from: myId, to: currentFriend, content })
            });
            document.getElementById("msgBox").innerHTML += `<div>我: ${content}</div>`;
            document.getElementById("msgInput").value = "";
        }

        loadChatList();
    </script>
</body>
</html>
