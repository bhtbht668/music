<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>微聊</title>
    <style>
        body { font-family: sans-serif; background-color: #ededed; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-box { width: 320px; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .auth-input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .auth-submit { width: 100%; padding: 10px; background: #07c160; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2 id="authTitle">登录微聊</h2>
        <input type="text" id="authUser" class="auth-input" placeholder="请输入微聊号">
        <input type="password" id="authPass" class="auth-input" placeholder="请输入密码">
        <button class="auth-submit" id="authBtn" onclick="handleAuthSubmit()">登录</button>
        <div style="margin-top:15px; font-size:12px; cursor:pointer; color:#576b95;" onclick="toggleMode()" id="toggleBtn">没有账号？去注册</div>
    </div>

    <script>
        // 记得把下面这一行换成你的真实 API 地址
        const API_BASE = "https://api.20140712.xyz"; 
        let isRegister = false;

        function toggleMode() {
            isRegister = !isRegister;
            document.getElementById('authTitle').innerText = isRegister ? "注册微聊" : "登录微聊";
            document.getElementById('authBtn').innerText = isRegister ? "注册并登录" : "登录";
            document.getElementById('toggleBtn').innerText = isRegister ? "已有账号？去登录" : "没有账号？去注册";
        }

        async function handleAuthSubmit() {
            const user = document.getElementById('authUser').value.trim();
            const pass = document.getElementById('authPass').value.trim();
            if (!user || !pass) { alert("请输入账号和密码"); return; }
            
            const endpoint = isRegister ? "/api/register" : "/api/login";
            
            try {
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: user, password: pass })
                });
                const data = await res.json();
                if (data.success) {
                    alert(isRegister ? "注册成功！" : "登录成功！");
                } else {
                    alert("操作失败，请重试");
                }
            } catch(e) {
                alert("网络连接失败，请检查 API 地址是否正确");
            }
        }
    </script>
</body>
</html>
