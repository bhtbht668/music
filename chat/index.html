<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>微聊 - 完整版</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        /* 登录遮罩 */
        #loginBox { position: fixed; top:0; left:0; width: 100%; height: 100%; background: white; z-index: 999; display: flex; justify-content: center; align-items: center; }
        #sidebar { width: 250px; background: #f8f9fa; border-right: 1px solid #ddd; padding: 15px; }
        #chat-area { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        #msgBox { flex: 1; border: 1px solid #ccc; overflow-y: auto; margin-bottom: 10px; padding: 10px; }
        li { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginBox">
        <div>
            <h2>微聊登录/注册</h2>
            <input id="uId" placeholder="账号"><br>
            <input id="uPw" type="password" placeholder="密码"><br>
            <button onclick="auth('login')">登录</button>
            <button onclick="auth('register')">注册</button>
        </div>
    </div>

    <div id="sidebar">
        <h3>好友列表</h3>
        <ul id="friendList"></ul>
    </div>
    <div id="chat-area">
        <h2 id="chatTitle">请先登录</h2>
        <div id="msgBox"></div>
        <div>
            <input id="msgInput" style="width: 80%" placeholder="输入消息...">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://api.20140712.xyz";
        let myId = "";

        async function auth(type) {
            const userId = document.getElementById('uId').value;
            const password = document.getElementById('uPw').value;
            const res = await fetch(`${API_BASE}/api/${type}`, {
                method: 'POST',
                body: JSON.stringify({ userId, password })
            });
            const data = await res.json();
            if (data.success) {
                myId = userId;
                document.getElementById('loginBox').style.display = 'none';
                loadChatList();
            } else {
                alert(type + "失败");
            }
        }

        async function loadChatList() {
            const res = await fetch(`${API_BASE}/api/list?userId=${myId}`);
            const data = await res.json();
            document.getElementById("friendList").innerHTML = data.friends
                .map(f => `<li onclick="selectFriend('${f.friendId}')">${f.friendId}</li>`).join('');
        }

        function selectFriend(friendId) {
            document.getElementById("chatTitle").innerText = "与 " + friendId + " 聊天";
        }

        async function sendMessage() { /* 同上代码 */ }
    </script>
</body>
</html>
