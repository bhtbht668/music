<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>微聊客户端</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        #sidebar { width: 250px; background: #f8f9fa; padding: 15px; border-right: 1px solid #ddd; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; background: white; margin-bottom: 8px; cursor: pointer; border-radius: 4px; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>好友</h3>
        <ul id="friendList"></ul>
        <h3>群组</h3>
        <ul id="groupList"></ul>
    </div>

    <script>
        // 关键点：统一使用完整 API 地址
        const API_BASE = "https://api.20140712.xyz";
        let myId = "001"; // 这里假设你登录后获取到了 ID

        async function loadChatList() {
            try {
                // 必须使用完整路径，防止浏览器自动拼凑路径导致 404
                const res = await fetch(`${API_BASE}/api/list?userId=${myId}`);
                const data = await res.json();
                
                // 渲染好友
                document.getElementById("friendList").innerHTML = data.friends.map(f => `<li>${f.friendId}</li>`).join('');
                // 渲染群组
                document.getElementById("groupList").innerHTML = data.groups.map(g => `<li>${g.groupId}</li>`).join('');
            } catch (e) {
                console.error("加载列表失败:", e);
            }
        }

        // 初始化加载
        loadChatList();
    </script>
</body>
</html>
