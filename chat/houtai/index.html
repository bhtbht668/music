<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .refresh-btn { background: #007bff; color: white; padding: 12px 30px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        .panel { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 15px; border-bottom: 1px solid #ddd; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .action-btn { color: #dc3545; cursor: pointer; background: none; border: 1px solid #dc3545; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>微聊超级管理后台</h1>
        <button class="refresh-btn" onclick="loadData()">🔄 强制刷新监控面板</button>
    </div>

    <div class="panel">
        <h2>用户与群聊监控</h2>
        <table id="userTable">
            <thead><tr><th>ID</th><th>类型</th><th>操作</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="panel">
        <h2>实时全网通信流</h2>
        <table id="msgTable">
            <thead><tr><th style="width:15%">发送者</th><th style="width:15%">接收</th><th>内容</th><th style="width:15%">时间</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const adminToken = prompt("请输入密匙:");
        async function loadData() {
            const res = await fetch("https://api.20140712.xyz/api/admin/data", { headers: { "Authorization": adminToken } });
            const data = await res.json();
            
            // 渲染用户/群聊
            const uBody = document.querySelector("#userTable tbody");
            uBody.innerHTML = [...data.users.map(u => `<tr><td>${u.userId}</td><td>用户</td><td><button class="action-btn" onclick="del('user','${u.userId}')">删除</button></td></tr>`),
                               ...data.groups.map(g => `<tr><td>${g.groupId}</td><td>群聊</td><td><button class="action-btn" onclick="del('group','${g.groupId}')">解散</button></td></tr>`)].join('');

            // 渲染消息流 (强制对齐)
            document.querySelector("#msgTable tbody").innerHTML = data.messages.map(m => `<tr><td>${m.from_user}</td><td>${m.to_id}</td><td>${m.content}</td><td>${m.timestamp}</td></tr>`).join('');
        }
        async function del(type, id) {
            if(confirm("确定操作?")) {
                await fetch("https://api.20140712.xyz/api/admin/delete", { method: 'POST', headers: { "Authorization": adminToken, "Content-Type": "application/json" }, body: JSON.stringify({type, id}) });
                loadData();
            }
        }
        loadData();
    </script>
</body>
</html>
