<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI 助手</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f1117;
    color:white;
    font-family:sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:95%;
    max-width:900px;
    height:90vh;

    background:#181c25;

    border-radius:25px;

    overflow:hidden;

    display:flex;
    flex-direction:column;

    box-shadow:
    0 0 40px rgba(0,0,0,.5);
}

.header{
    padding:20px;
    font-size:24px;
    font-weight:bold;
    border-bottom:1px solid rgba(255,255,255,.08);
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    margin-bottom:20px;
    display:flex;
}

.user{
    justify-content:flex-end;
}

.bot{
    justify-content:flex-start;
}

.bubble{
    max-width:80%;
    padding:15px 18px;
    border-radius:18px;
    line-height:1.6;
    white-space:pre-wrap;
}

.user .bubble{
    background:#0078ff;
}

.bot .bubble{
    background:#2a3040;
}

.input-area{
    display:flex;
    gap:10px;
    padding:20px;
    border-top:1px solid rgba(255,255,255,.08);
}

textarea{
    flex:1;
    height:60px;
    resize:none;
    border:none;
    outline:none;
    border-radius:15px;
    padding:15px;
    font-size:16px;
    background:#232938;
    color:white;
}

button{
    width:120px;
    border:none;
    border-radius:15px;
    background:#0078ff;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.loading{
    opacity:.6;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
🤖 AI 助手
</div>

<div class="chat" id="chat">

<div class="message bot">
<div class="bubble">
你好，请问有什么需要帮助的吗？
</div>
</div>

</div>

<div class="input-area">

<textarea
id="input"
placeholder="输入问题..."></textarea>

<button onclick="sendMessage()">
发送
</button>

</div>

</div>

<script>

const chat = document.getElementById('chat')

const input = document.getElementById('input')

function addMessage(text,type){

    const message = document.createElement('div')

    message.className = 'message ' + type

    const bubble = document.createElement('div')

    bubble.className = 'bubble'

    bubble.innerText = text

    message.appendChild(bubble)

    chat.appendChild(message)

    chat.scrollTop = chat.scrollHeight

}

async function sendMessage(){

    const text = input.value.trim()

    if(!text) return

    addMessage(text,'user')

    input.value = ''

    addMessage('AI 正在思考中...','bot')

    const loadingBubble =
    document.querySelectorAll('.bot .bubble')

    const lastBubble =
    loadingBubble[loadingBubble.length - 1]

    try{

        const response = await fetch(
            'https://weathered-math-1843.bhtbht668.workers.dev/',
            {
                method:'POST',

                headers:{
                    'Content-Type':'application/json'
                },

                body:JSON.stringify({
                    message:text
                })
            }
        )

        const data = await response.json()

        lastBubble.innerText =
        data.reply || '没有回复'

    }catch(err){

        lastBubble.innerText =
        '请求失败：' + err.message

    }

}

input.addEventListener('keydown',e=>{

    if(e.key === 'Enter' && !e.shiftKey){

        e.preventDefault()

        sendMessage()

    }

})

</script>

</body>
</html>
