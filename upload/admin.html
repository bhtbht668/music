<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微聊核心数据后台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #f4f6f9; color: #333; padding: 30px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 30px; }
        .admin-header h1 { font-size: 24px; color: #1e293b; }
        .refresh-btn { background-color: #007bc7; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .refresh-btn:hover { background-color: #005a94; }
        .panel-container { display: flex; gap: 30px; flex-wrap: wrap; }
        .panel { flex: 1; min-width: 450px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 30px; }
        .panel.full-width { flex-basis: 100%; }
        .panel h2 { font-size: 18px; margin-bottom: 15px; color: #475569; padding-bottom: 8px; border-bottom: 1px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #f1f5f9; word-break: break-all; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 600; }
        tr:hover { background-color: #f8fafc; }
        .crypto-pass { font-family: monospace; color: #64748b; font-size: 12px; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge.private { background-color: #e0f2fe; color: #0369a1; }
        .badge.group { background-color: #dcfce7; color: #15803d; }
        .action-btn { color: #ef4444; background: none; border: none; cursor: pointer; font-size: 13px; font-weight: bold; }
        .action-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="admin-header">
        <h1>微聊云端数据监控总后台</h1>
        <button class="refresh-btn" onclick="loadAdminData()">⚙️ 强制刷新核心数据</button>
    </div>

    <div class="panel-container">
        <div class="panel">
            <h2>全量注册账户监控 (<span id="userCount">0</span>)</h2>
            <table>
                <thead>
                    <tr>
                        <th>微聊号(账号)</th>
                        <th>安全凭证(SHA-512密码哈希)</th>
                        <th>管控操作</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="3" style="text-align:center; color:#999;">正在同步云端结构...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="panel">
            <h2>全量活动群聊监控 (<span id="groupCount">0</span>)</h2>
            <table>
                <thead>
                    <tr>
                        <th>群聊号(群名称)</th>
                        <th>状态</th>
                        <th>管控操作</th>
                    </tr>
                </thead>
                <tbody id="groupTableBody">
                    <tr><td colspan="3" style="text-align:center; color:#999;">正在同步云端结构...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="panel full-width">
            <h2>全网实时通信对话流监控 (<span id="msgCount">0</span>)</h2>
            <table>
                <thead>
                    <tr>
                        <th>发送者</th>
                        <th>接收目标</th>
                        <th>业务类型</th>
                        <th>明文消息内容</th>
                        <th>时间戳</th>
                    </tr>
                </thead>
                <tbody id="msgTableBody">
                    <tr><td colspan="5" style="text-align:center; color:#999;">正在拦截全网流...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = "https://api.20140712.xyz";
        let adminToken = "";

        function initAdminAuth() {
            const inputKey = prompt("请输入超级管理员安全指令密匙进入后台:");
            if (!inputKey) {
                renderAuthError();
                return;
            }
            adminToken = inputKey.trim();
            loadAdminData();
            setInterval(loadAdminData, 5000);
        }

        function renderAuthError() {
            document.body.innerHTML = "<h1 style='text-align:center; margin-top:100px; color:#ef4444;'>401 未获授权的安全请求</h1><p style='text-align:center; color:#666; margin-top:20px;'>密码校验失败，通道已安全拦截。</p>";
        }

        async function loadAdminData() {
            if (!adminToken) return;
            try {
                const userRes = await fetch(`${API_BASE}/api/admin/users`, {
                    headers: { "Authorization": adminToken }
                });
                
                if (userRes.status === 401) {
                    renderAuthError();
                    return;
                }
                
                const data = await userRes.json();
                renderUsers(data.users || []);
                renderGroups(data.groups || []);

                const msgRes = await fetch(`${API_BASE}/api/admin/messages`, {
                    headers: { "Authorization": adminToken }
                });
                
                if (msgRes.status === 401) {
                    renderAuthError();
                    return;
                }
                
                const messages = await msgRes.json();
                renderMessages(messages || []);
                
            } catch (e) {
                console.error(e);
            }
        }

        function renderUsers(users) {
            document.getElementById('userCount').innerText = users.length;
            const tbody = document.getElementById('userTableBody');
            if(users.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:#999;">暂无任何注册账号</td></tr>`;
                return;
            }
            let html = "";
            users.forEach(u => {
                html += `
                    <tr>
                        <td><strong>${u.userId}</strong></td>
                        <td><span class="crypto-pass">${u.password ? u.password.substring(0,16) + '...' : '未设密'}</span></td>
                        <td><button class="action-btn" onclick="kickUser('${u.userId}')">强制销户</button></td>
                    </tr>`;
            });
            tbody.innerHTML = html;
        }

        function renderGroups(groups) {
            document.getElementById('groupCount').innerText = groups.length;
            const tbody = document.getElementById('groupTableBody');
            if(groups.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:#999;">暂无任何活动群聊</td></tr>`;
                return;
            }
            let html = "";
            groups.forEach(g => {
                html += `
                    <tr>
                        <td><strong>${g}</strong></td>
                        <td><span class="badge group">存活中</span></td>
                        <td><button class="action-btn" onclick="dissolveGroup('${g}')">强制解散</button></td>
                    </tr>`;
            });
            tbody.innerHTML = html;
        }

        function renderMessages(messages) {
            document.getElementById('msgCount').innerText = messages.length;
            const tbody = document.getElementById('msgTableBody');
            if(messages.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#999;">全网暂无任何对话</td></tr>`;
                return;
            }
            let html = "";
            messages.forEach(m => {
                const isPrivate = m.type === 'private';
                html += `
                    <tr>
                        <td><code>${m.from_user}</code></td>
                        <td><code>${m.to_id}</code></td>
                        <td><span class="badge ${isPrivate ? 'private' : 'group'}">${isPrivate ? '私聊' : '群聊'}</span></td>
                        <td><strong>${m.content}</strong></td>
                        <td style="color:#999; font-size:12px;">${m.timestamp}</td>
                    </tr>`;
            });
            tbody.innerHTML = html;
        }

        // 已经修正：路径补全为 /api/admin/delete-user
        async function kickUser(targetUserId) {
            if(!confirm(`确定要注销账号 ${targetUserId} 吗？`)) return;
            try {
                await fetch(`${API_BASE}/api/admin/delete-user`, {
                    method: 'POST',
                    headers: { "Content-Type": "application/json", "Authorization": adminToken },
                    body: JSON.stringify({ targetUserId: targetUserId })
                });
                loadAdminData();
            } catch(e) {}
        }

        // 已经确认：路径为 /api/admin/delete-group
        async function dissolveGroup(targetGroupId) {
            if(!confirm(`确定要强制解散群聊 【${targetGroupId}】 吗？`)) return;
            try {
                await fetch(`${API_BASE}/api/admin/delete-group`, {
                    method: 'POST',
                    headers: { "Content-Type": "application/json", "Authorization": adminToken },
                    body: JSON.stringify({ targetGroupId: targetGroupId })
                });
                loadAdminData();
            } catch(e) {}
        }

        initAdminAuth();
    </script>
</body>
</html>
